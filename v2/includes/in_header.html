<style>
  #hi-version-badge {
    position: fixed;
    top: 12px;
    right: 18px;
    z-index: 1000;
    background: #ffffff;
    border: 1px solid #00AA5B;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 14px;
    line-height: 1.4;
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
  }
  #hi-version-badge a {
    color: #00AA5B;
    font-weight: 600;
    text-decoration: none;
  }
  #hi-version-badge a:hover {
    text-decoration: underline;
  }
</style>

<script>
  // Make every external link (http/https) open in a new tab.
  // Internal navigation (relative anchors and same-domain chapter links) is unaffected.
  document.addEventListener('DOMContentLoaded', function() {
    var host = window.location.host;
    document.querySelectorAll('a[href^="http://"], a[href^="https://"]').forEach(function(a) {
      var url;
      try { url = new URL(a.href); } catch (e) { return; }
      if (url.host && url.host !== host) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      }
    });
  });
</script>
