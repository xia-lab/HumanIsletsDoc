bookdown::gitbook:
  css: style.css
  includes:
    in_header: includes/in_header.html
    before_body: includes/version_banner.html
  config:
    toc:
      before: |
        <li><a href="./">Human Islets (v2)</a></li>

    edit: https://github.com/xia-lab/HumanIsletsDoc/blob/main/v2/%s
    download: ["pdf", "epub"]
  search:
    enabled: true
  content_selector: '.markdown-body'
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
bookdown::epub_book: default
